<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Control de Acceso</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0f14;
  --surface: #161922;
  --border: #252a35;
  --accent-a: #00e5a0;
  --accent-b: #3d8bff;
  --absent: #ff4d6d;
  --text: #e8ecf4;
  --muted: #5a6278;
  --radius: 12px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  padding: 0 0 80px;
}

header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(13,15,20,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 14px;
}

header h1 {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.3px;
  color: var(--text);
}

header .subtitle {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

#save-indicator {
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
  letter-spacing: 0.3px;
  transition: color 0.3s ease;
}

#save-indicator.saved {
  color: var(--accent-a);
}

.totals-bar {
  display: flex;
  gap: 10px;
  padding: 14px 20px;
  overflow-x: auto;
  scrollbar-width: none;
}

.totals-bar::-webkit-scrollbar { display: none; }

.stat-pill {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 7px 14px;
  font-size: 12px;
  white-space: nowrap;
}

.stat-pill .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}

.dot-total { background: var(--muted); }
.dot-present { background: var(--accent-a); box-shadow: 0 0 6px var(--accent-a); }
.dot-absent { background: var(--absent); box-shadow: 0 0 6px var(--absent); }

.stat-pill strong { color: var(--text); }

.section {
  padding: 0 16px;
  margin-bottom: 28px;
}

.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 4px 10px;
  margin-bottom: 6px;
}

.section-title {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.section-a .section-title { color: var(--accent-a); }
.section-b .section-title { color: var(--accent-b); }

.section-count {
  font-size: 11px;
  color: var(--muted);
  margin-left: auto;
}

.divider {
  height: 1px;
  background: var(--border);
  margin-bottom: 10px;
}

.student-grid {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.student-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 13px 16px;
  cursor: pointer;
  transition: all 0.18s ease;
  -webkit-tap-highlight-color: transparent;
  text-align: left;
}

.student-btn:active {
  transform: scale(0.98);
}

.student-name {
  font-size: 14px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
}

.status-badge {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 100px;
  border: 1px solid transparent;
  transition: all 0.18s ease;
  flex-shrink: 0;
}

.status-pending {
  color: var(--muted);
  border-color: var(--border);
}

.status-present {
  color: var(--accent-a);
  border-color: var(--accent-a);
  background: rgba(0,229,160,0.08);
}

.status-absent {
  color: var(--absent);
  border-color: var(--absent);
  background: rgba(255,77,109,0.08);
}

.student-btn.is-present {
  border-color: rgba(0,229,160,0.25);
  background: rgba(0,229,160,0.04);
}

.student-btn.is-absent {
  border-color: rgba(255,77,109,0.2);
  background: rgba(255,77,109,0.04);
  opacity: 0.75;
}

.hint {
  font-size: 10px;
  color: var(--muted);
  text-align: center;
  padding: 6px 20px 0;
  letter-spacing: 0.3px;
}

.fab {
  position: fixed;
  bottom: 24px;
  right: 20px;
  background: var(--accent-a);
  color: #0d0f14;
  border: none;
  border-radius: 100px;
  padding: 14px 22px;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(0,229,160,0.35);
  -webkit-tap-highlight-color: transparent;
  letter-spacing: 0.3px;
}

.fab:active { transform: scale(0.96); }

.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  align-items: flex-end;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 40px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
}

.modal h2 {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 16px;
  color: var(--text);
}

.modal pre {
  font-size: 12px;
  line-height: 1.8;
  color: var(--text);
  white-space: pre-wrap;
  background: var(--bg);
  border-radius: 10px;
  padding: 16px;
  border: 1px solid var(--border);
}

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}

.btn-copy, .btn-close {
  flex: 1;
  padding: 13px;
  border-radius: var(--radius);
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  -webkit-tap-highlight-color: transparent;
}

.btn-copy { background: var(--accent-a); color: #0d0f14; }
.btn-close { background: var(--border); color: var(--text); }

.reset-btn {
  display: block;
  width: calc(100% - 32px);
  margin: 0 16px 8px;
  padding: 12px;
  background: transparent;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  text-align: center;
  letter-spacing: 0.3px;
  -webkit-tap-highlight-color: transparent;
}
</style>
</head>
<body>

<header>
  <h1>Control de Acceso</h1>
  <div class="subtitle">Toca = Presente · Toca de nuevo = Ausente · 3er toque = Sin marcar</div>
  <div id="save-indicator">Sin cambios guardados</div>
</header>

<div class="totals-bar">
  <div class="stat-pill"><span class="dot dot-total"></span> Total: <strong id="count-total">0</strong></div>
  <div class="stat-pill"><span class="dot dot-present"></span> Presentes: <strong id="count-present">0</strong></div>
  <div class="stat-pill"><span class="dot dot-absent"></span> Ausentes: <strong id="count-absent">0</strong></div>
  <div class="stat-pill"><span class="dot dot-total"></span> Sin marcar: <strong id="count-pending">0</strong></div>
</div>

<div class="section section-a">
  <div class="section-header">
    <span class="section-title">3ro Medio A</span>
    <span class="section-count" id="count-a">0 / 15</span>
  </div>
  <div class="divider"></div>
  <div class="student-grid" id="grid-a"></div>
</div>

<div class="section section-b">
  <div class="section-header">
    <span class="section-title">3ro Medio B</span>
    <span class="section-count" id="count-b">0 / 21</span>
  </div>
  <div class="divider"></div>
  <div class="student-grid" id="grid-b"></div>
</div>

<button class="reset-btn" onclick="resetAll()">↺ Reiniciar todo</button>

<button class="fab" onclick="openReport()">Ver Resumen</button>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Resumen de Asistencia</h2>
    <pre id="report-text"></pre>
    <div class="modal-actions">
      <button class="btn-copy" onclick="copyReport()">Copiar</button>
      <button class="btn-close" onclick="closeModal()">Cerrar</button>
    </div>
  </div>
</div>

<script>
const cursoA = [
  "Eric Agüero","Trinidad Navarrete","Lucas Araneda","Isabel Lizana",
  "Catalina Henríquez","Emilia Godoy","Isadora Valenzuela","Sofía Venegas",
  "Colomba Quiroga","Laura Villamán","Denisse Jeldres","Amanda Montoya",
  "Julieta Muñoz","Xiomara Rogel","Tomás Toledo","Nicolás Lemus"
];

const cursoB = [
  "Bruno Barra","Ailynne Carrasco","Rocío Correa","Luciano Donoso",
  "Agustín Fernández","Diego Herrera","Camila Herrera","Isabela Medina",
  "Damián Mella","Martina Opazo","Emilio Parra","Javier Pérez",
  "Carlos Pérez","Eva Riquelme","Catalina Segura","Joaquín Silva",
  "Constanza Solorza","Emily Toledo","Antonia Urra","Joaquín Villarroel",
  "Florencia Villarroel","Javiera Villegas"
];

// state: 0=pending, 1=present, 2=absent
const state = {};

const STORAGE_KEY = 'control-acceso-state';

function saveState() {
  const now = new Date();
  const payload = { state, savedAt: now.toISOString() };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));

  const hora = now.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });
  const fecha = now.toLocaleDateString('es-CL', { day: '2-digit', month: '2-digit', year: 'numeric' });
  const indicator = document.getElementById('save-indicator');
  indicator.textContent = `Guardado: ${fecha} ${hora}`;
  indicator.classList.add('saved');
  setTimeout(() => indicator.classList.remove('saved'), 1500);
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const payload = JSON.parse(raw);
    if (payload && payload.state) return payload;
  } catch (e) { /* ignore corrupt data */ }
  return null;
}

function restoreSaveIndicator(savedAt) {
  if (!savedAt) return;
  const saved = new Date(savedAt);
  const hora = saved.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });
  const fecha = saved.toLocaleDateString('es-CL', { day: '2-digit', month: '2-digit', year: 'numeric' });
  document.getElementById('save-indicator').textContent = `Guardado: ${fecha} ${hora}`;
}

function initGrid(names, gridId) {
  const grid = document.getElementById(gridId);
  names.forEach(name => {
    if (state[name] === undefined) state[name] = 0;
    const btn = document.createElement('button');
    btn.className = 'student-btn';
    btn.id = 'btn-' + name;
    btn.innerHTML = `<span class="student-name">${name}</span><span class="status-badge status-pending" id="badge-${name}">—</span>`;
    btn.addEventListener('click', () => toggle(name));
    grid.appendChild(btn);
    updateBtn(name);
  });
}

function toggle(name) {
  state[name] = (state[name] + 1) % 3;
  updateBtn(name);
  updateCounters();
  saveState();
}

function updateBtn(name) {
  const btn = document.getElementById('btn-' + name);
  const badge = document.getElementById('badge-' + name);
  btn.className = 'student-btn';
  badge.className = 'status-badge';
  if (state[name] === 1) {
    btn.classList.add('is-present');
    badge.classList.add('status-present');
    badge.textContent = '✓ Presente';
  } else if (state[name] === 2) {
    btn.classList.add('is-absent');
    badge.classList.add('status-absent');
    badge.textContent = '✗ Ausente';
  } else {
    badge.classList.add('status-pending');
    badge.textContent = '—';
  }
}

function updateCounters() {
  const all = [...cursoA, ...cursoB];
  const present = all.filter(n => state[n] === 1);
  const absent = all.filter(n => state[n] === 2);
  const pending = all.filter(n => state[n] === 0);

  document.getElementById('count-total').textContent = all.length;
  document.getElementById('count-present').textContent = present.length;
  document.getElementById('count-absent').textContent = absent.length;
  document.getElementById('count-pending').textContent = pending.length;

  const presentA = cursoA.filter(n => state[n] === 1).length;
  const presentB = cursoB.filter(n => state[n] === 1).length;
  document.getElementById('count-a').textContent = `${presentA} / ${cursoA.length}`;
  document.getElementById('count-b').textContent = `${presentB} / ${cursoB.length}`;
}

function resetAll() {
  if (!confirm('¿Reiniciar todo el control de acceso?')) return;
  [...cursoA, ...cursoB].forEach(n => { state[n] = 0; updateBtn(n); });
  updateCounters();
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('save-indicator').textContent = 'Sin cambios guardados';
}

function openReport() {
  const now = new Date();
  const fecha = now.toLocaleDateString('es-CL', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  const hora = now.toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit' });

  let txt = `CONTROL DE ACCESO\n${fecha} — ${hora}\n${'─'.repeat(36)}\n\n`;

  ['A','B'].forEach(letra => {
    const lista = letra === 'A' ? cursoA : cursoB;
    const pres = lista.filter(n => state[n] === 1);
    const aus = lista.filter(n => state[n] === 2);
    const pend = lista.filter(n => state[n] === 0);

    txt += `3ro MEDIO ${letra} (${lista.length} alumnos)\n`;
    txt += `Presentes: ${pres.length} | Ausentes: ${aus.length} | Sin marcar: ${pend.length}\n\n`;

    if (pres.length) txt += `✓ PRESENTES:\n` + pres.map(n=>`  ${n}`).join('\n') + '\n\n';
    if (aus.length)  txt += `✗ AUSENTES:\n` + aus.map(n=>`  ${n}`).join('\n') + '\n\n';
    if (pend.length) txt += `— SIN MARCAR:\n` + pend.map(n=>`  ${n}`).join('\n') + '\n\n';
    txt += '─'.repeat(36) + '\n\n';
  });

  const totalPres = [...cursoA,...cursoB].filter(n=>state[n]===1).length;
  const totalAus  = [...cursoA,...cursoB].filter(n=>state[n]===2).length;
  txt += `TOTAL GENERAL\nPresentes: ${totalPres} | Ausentes: ${totalAus}`;

  document.getElementById('report-text').textContent = txt;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function copyReport() {
  const txt = document.getElementById('report-text').textContent;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '¡Copiado!';
    setTimeout(() => btn.textContent = 'Copiar', 1800);
  });
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// Init: restore persisted state before building the grid
const saved = loadState();
if (saved) {
  Object.assign(state, saved.state);
  restoreSaveIndicator(saved.savedAt);
}

initGrid(cursoA, 'grid-a');
initGrid(cursoB, 'grid-b');
updateCounters();
</script>

</body>
</html>
